[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fm_generator"
version = "0.0.1"
description = "Internal fork of fm_generator — random UVL feature model generator. Maintained in-tree under app/modules/generator/vendor."
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["."]
include = ["fm_generator*"]
