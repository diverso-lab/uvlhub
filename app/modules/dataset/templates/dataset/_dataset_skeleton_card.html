{#
  Skeleton placeholder that mimics a dataset result/summary card.
  Reused by the main page, explore results, and anywhere a dataset card is
  loading. Purely visual — no server data required.
#}
<div class="card mb-5 dataset-skeleton-card" aria-hidden="true">
    <div class="card-body">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <span class="skeleton skeleton-line xl" style="width: 55%;"></span>
            <span class="skeleton skeleton-line" style="width: 90px; height: 20px;"></span>
        </div>
        <span class="skeleton skeleton-line sm mb-3" style="width: 30%;"></span>

        <div class="mb-3">
            <span class="skeleton skeleton-line sm" style="width: 45%;"></span>
            <span class="skeleton skeleton-line sm" style="width: 38%;"></span>
        </div>

        <span class="skeleton skeleton-line" style="width: 92%;"></span>
        <span class="skeleton skeleton-line" style="width: 78%;"></span>

        <div class="d-flex gap-2 mt-3 mb-3">
            <span class="skeleton skeleton-line" style="width: 42px; height: 20px;"></span>
            <span class="skeleton skeleton-line" style="width: 42px; height: 20px;"></span>
            <span class="skeleton skeleton-line" style="width: 42px; height: 20px;"></span>
        </div>

        <div class="d-flex align-items-center gap-2">
            <span class="skeleton" style="width: 140px; height: 35px;"></span>
            <span class="skeleton" style="width: 35px; height: 35px;"></span>
            <span class="skeleton" style="width: 35px; height: 35px;"></span>
        </div>
    </div>
</div>
