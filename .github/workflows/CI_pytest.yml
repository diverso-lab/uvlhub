name: Pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-24.04

    env:
      MARIADB_ROOT_PASSWORD: uvlhub_root_password
      MARIADB_DATABASE: uvlhubdb_test
      MARIADB_TEST_DATABASE: uvlhubdb_test
      MARIADB_USER: uvlhub_user
      MARIADB_PASSWORD: uvlhub_password
      MARIADB_HOSTNAME: 127.0.0.1
      MARIADB_PORT: 3306
      FLASK_ENV: testing
      # Lets splent_framework's ConfigManager/ErrorHandlerManager find app.config / app.errors
      SPLENT_APP: app
      # Installed entry-point scripts run without cwd on sys.path; make `app` importable
      PYTHONPATH: ${{ github.workspace }}

    services:
      mariadb:
        image: mariadb:12.0.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ env.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ${{ env.MARIADB_DATABASE }}
          MARIADB_USER: ${{ env.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ env.MARIADB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -u root -p$MARIADB_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies (pinned in pyproject.toml)
        run: |
          python -m pip install --upgrade pip
          pip install --pre .

      - name: Install generator vendor package
        # The generator feature pulls its feature-model generator from a
        # vendored source tree; pytest imports Params from it directly, so
        # install it editable into the CI Python env.
        run: pip install --no-cache-dir -e ./app/features/generator/vendor

      - name: Run tests (fast pyramid — unit + repository + service + integration)
        run: pytest app/features -m "(unit or repository or service or integration) and not slow"
