{% extends "generator/index.html" %}
{% block title %}Finishing{% endblock %}

{% block wizard_content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h3 class="mb-3 text-center">Finishing</h3>
    <p class="mb-4 text-center">
      Your feature models are being generated. If download does not start, refresh this page.
    </p>

    <div class="mb-3">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <span id="generate-phase" class="fw-semibold">Preparing...</span>
        <span id="generate-percent" class="fw-semibold">0%</span>
      </div>

      <div class="progress" style="height: 24px;">
        <div
          id="generate-progress-bar"
          class="progress-bar progress-bar-striped progress-bar-animated"
          role="progressbar"
          style="width: 0%;"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          0%
        </div>
      </div>
    </div>

    <div id="generate-status" class="mt-3 fw-bold text-center"></div>

    <div class="card mt-4">
      <div class="card-header fw-semibold">
        Generation log
      </div>
      <div
        id="generate-log-viewer"
        style="
          background: #111827;
          color: #e5e7eb;
          font-family: monospace;
          font-size: 0.92rem;
          height: 280px;
          overflow-y: auto;
          padding: 12px;
          white-space: pre-wrap;
          border-bottom-left-radius: 0.375rem;
          border-bottom-right-radius: 0.375rem;
        "
      ></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}

  <script type="module">
    import { loadPyodide } from "{{ url_for('static', filename='pyodide/pyodide.mjs') }}";
    window.loadPyodide = loadPyodide;
  </script>

  <script
    type="module"
    src="{{ url_for('static', filename='js/generator.bundle.js') }}">
  </script>

  <script src="{{ url_for('static', filename='pyodide/pyodide.js') }}"></script>
{% endblock %}
